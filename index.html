<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Switchblades Sudoku</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f5f4;
      --text: #1a1a18;
      --text-secondary: #6b6b67;
      --border: rgba(0,0,0,0.15);
      --border-strong: rgba(0,0,0,0.35);
      --blue: #185FA5;
      --blue-light: #E6F1FB;
      --green-light: #EAF3DE;
      --red: #A32D2D;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --bg-secondary: #242422;
        --text: #e8e8e4;
        --text-secondary: #8a8a84;
        --border: rgba(255,255,255,0.15);
        --border-strong: rgba(255,255,255,0.35);
        --blue: #85B7EB;
        --blue-light: #042C53;
        --green-light: #173404;
        --red: #F09595;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    #app { width: 100%; max-width: 500px; }

    h1 {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 1.25rem;
    }

    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .diff-btn {
      font-size: 12px;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }

    .diff-btn.active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    .diff-btn:hover:not(.active) { background: var(--bg-secondary); }

    .new-btn {
      font-size: 12px;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .new-btn:hover { background: var(--bg-secondary); }

    .status-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 12px;
      font-size: 13px;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--text-secondary);
    }

    .stat span { font-weight: 600; color: var(--text); }

    .board-wrap {
      border: 2px solid var(--border-strong);
      border-radius: var(--radius-md);
      overflow: hidden;
      width: 100%;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      width: 100%;
      aspect-ratio: 1;
    }

    .cell {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(13px, 3vw, 20px);
      cursor: pointer;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
      user-select: none;
    }

    .cell:nth-child(3n)         { border-right: 2px solid var(--border-strong); }
    .cell:nth-child(9n)         { border-right: none; }
    .cell:nth-child(n+19):nth-child(-n+27),
    .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 2px solid var(--border-strong); }
    .cell:nth-child(n+73):nth-child(-n+81) { border-bottom: none; }

    .cell.given   { font-weight: 600; color: var(--text); }
    .cell.user    { color: var(--blue); }
    .cell.selected  { background: var(--blue-light); }
    .cell.highlight { background: var(--bg-secondary); }
    .cell.error   { color: var(--red) !important; }

    @keyframes flash {
      0%, 100% { background: transparent; }
      50%       { background: var(--green-light); }
    }

    .notes {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      grid-template-rows: repeat(3,1fr);
      width: 100%;
      height: 100%;
      padding: 2px;
    }

    .note {
      font-size: 8px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .numpad {
      display: grid;
      grid-template-columns: repeat(9,1fr);
      gap: 4px;
      margin-top: 12px;
    }

    .num-btn {
      aspect-ratio: 1;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: var(--bg);
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.1s;
      color: var(--text);
    }

    .num-btn:hover { background: var(--bg-secondary); border-color: var(--border-strong); }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .act-btn {
      flex: 1;
      padding: 8px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: var(--bg);
      font-size: 12px;
      cursor: pointer;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: background 0.1s;
    }

    .act-btn:hover    { background: var(--bg-secondary); }
    .act-btn.active   { color: var(--blue); border-color: var(--blue); }

    .win-msg {
      margin-top: 1rem;
      padding: 14px 16px;
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      text-align: center;
      display: none;
    }

    .win-msg.show { display: block; }
    .win-msg p    { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .win-msg small { font-size: 12px; color: var(--text-secondary); }

    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
  </style>
</head>
<body>
<div id="app">
  <h2 class="sr-only">Sudoku game — fill the 9×9 grid so each row, column, and 3×3 box contains the digits 1–9.</h2>
  <h1>SUDOKU</h1>
  <p class="subtitle">Fill each row, column &amp; box with 1–9.</p>

  <div class="controls">
    <button class="diff-btn active" onclick="setDiff('easy')">Easy</button>
    <button class="diff-btn" onclick="setDiff('medium')">Medium</button>
    <button class="diff-btn" onclick="setDiff('hard')">Hard</button>
    <button class="new-btn" onclick="newGame()">
      <i class="ti ti-refresh" aria-hidden="true"></i> New Game
    </button>
  </div>

  <div class="status-bar">
    <div class="stat"><i class="ti ti-clock" aria-hidden="true" style="font-size:14px"></i> <span id="timer">0:00</span></div>
    <div class="stat"><i class="ti ti-x" aria-hidden="true" style="font-size:14px"></i> Errors: <span id="errors">0</span></div>
    <div class="stat"><i class="ti ti-layout-grid" aria-hidden="true" style="font-size:14px"></i> Remaining: <span id="remaining">0</span></div>
  </div>

  <div class="board-wrap"><div class="board" id="board"></div></div>
  <div class="numpad" id="numpad"></div>

  <div class="actions">
    <button class="act-btn" id="noteBtn" onclick="toggleNoteMode()">
      <i class="ti ti-pencil" aria-hidden="true"></i> Notes
    </button>
    <button class="act-btn" onclick="erase()">
      <i class="ti ti-eraser" aria-hidden="true"></i> Erase
    </button>
    <button class="act-btn" onclick="hint()">
      <i class="ti ti-bulb" aria-hidden="true"></i> Hint
    </button>
  </div>

  <div class="win-msg" id="winMsg">
    <p>🎉 Puzzle Complete!</p>
    <small id="winDetail"></small>
  </div>
</div>

<script>
  let grid = [], solution = [], given = [], notes = [], selected = null;
  let errors = 0, difficulty = 'easy', noteMode = false, timerSec = 0, timerInt = null, won = false;

  function solveSudoku(g) {
    const empty = [];
    for (let i = 0; i < 81; i++) if (g[i] === 0) empty.push(i);

    function valid(g, idx, n) {
      const r = Math.floor(idx / 9), c = idx % 9;
      for (let i = 0; i < 9; i++) {
        if (g[r * 9 + i] === n) return false;
        if (g[i * 9 + c] === n) return false;
      }
      const br = Math.floor(r / 3) * 3, bc = Math.floor(c / 3) * 3;
      for (let dr = 0; dr < 3; dr++)
        for (let dc = 0; dc < 3; dc++)
          if (g[(br + dr) * 9 + (bc + dc)] === n) return false;
      return true;
    }

    function solve(pos) {
      if (pos === empty.length) return true;
      const idx = empty[pos];
      const nums = [1, 2, 3, 4, 5, 6, 7, 8, 9].sort(() => Math.random() - 0.5);
      for (let n of nums) {
        if (valid(g, idx, n)) {
          g[idx] = n;
          if (solve(pos + 1)) return true;
          g[idx] = 0;
        }
      }
      return false;
    }

    solve(0);
    return g;
  }

  function generatePuzzle(diff) {
    let s = Array(81).fill(0);
    solveSudoku(s);
    const sol = [...s];
    const removes = diff === 'easy' ? 36 : diff === 'medium' ? 46 : 54;
    let positions = [...Array(81).keys()].sort(() => Math.random() - 0.5);
    let removed = 0, p = [...s];
    for (let idx of positions) {
      if (removed >= removes) break;
      p[idx] = 0;
      removed++;
    }
    return { puzzle: p, solution: sol };
  }

  function newGame() {
    clearInterval(timerInt);
    timerSec = 0;
    won = false;
    const { puzzle, solution: sol } = generatePuzzle(difficulty);
    grid = [...puzzle];
    solution = sol;
    given = grid.map(v => v !== 0);
    notes = Array(81).fill(null).map(() => new Set());
    errors = 0;
    selected = null;
    document.getElementById('errors').textContent = '0';
    document.getElementById('timer').textContent = '0:00';
    document.getElementById('winMsg').classList.remove('show');
    render();
    updateRemaining();
    timerInt = setInterval(() => {
      timerSec++;
      const m = Math.floor(timerSec / 60), s = timerSec % 60;
      document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2, '0')}`;
    }, 1000);
  }

  function setDiff(d) {
    difficulty = d;
    document.querySelectorAll('.diff-btn').forEach(b =>
      b.classList.toggle('active', b.textContent.toLowerCase() === d)
    );
    newGame();
  }

  function render() {
    const board = document.getElementById('board');
    board.innerHTML = '';
    for (let i = 0; i < 81; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.idx = i;

      if (given[i]) {
        cell.classList.add('given');
        cell.textContent = grid[i];
      } else if (grid[i]) {
        cell.classList.add('user');
        if (grid[i] !== solution[i]) cell.classList.add('error');
        cell.textContent = grid[i];
      } else if (notes[i].size > 0) {
        const nd = document.createElement('div');
        nd.className = 'notes';
        for (let n = 1; n <= 9; n++) {
          const s = document.createElement('div');
          s.className = 'note';
          s.textContent = notes[i].has(n) ? n : '';
          nd.appendChild(s);
        }
        cell.appendChild(nd);
      }

      if (selected === i) {
        cell.classList.add('selected');
      } else if (selected !== null) {
        const sr = Math.floor(selected / 9), sc = selected % 9;
        const sbr = Math.floor(sr / 3), sbc = Math.floor(sc / 3);
        const r = Math.floor(i / 9), c = i % 9;
        if (r === sr || c === sc || (Math.floor(r / 3) === sbr && Math.floor(c / 3) === sbc))
          cell.classList.add('highlight');
        if (grid[selected] && grid[i] === grid[selected])
          cell.classList.add('highlight');
      }

      cell.addEventListener('click', () => selectCell(parseInt(cell.dataset.idx)));
      board.appendChild(cell);
    }

    const np = document.getElementById('numpad');
    np.innerHTML = '';
    for (let n = 1; n <= 9; n++) {
      const b = document.createElement('button');
      b.className = 'num-btn';
      b.textContent = n;
      b.addEventListener('click', () => inputNum(n));
      np.appendChild(b);
    }
  }

  function selectCell(idx) {
    selected = idx;
    render();
  }

  function inputNum(n) {
    if (selected === null || given[selected] || won) return;
    if (noteMode) {
      if (grid[selected]) return;
      if (notes[selected].has(n)) notes[selected].delete(n);
      else notes[selected].add(n);
      render();
      return;
    }
    notes[selected].clear();
    if (grid[selected] !== n) {
      if (grid[selected] !== 0 && grid[selected] !== solution[selected]) errors--;
      grid[selected] = n;
      if (n !== solution[selected]) {
        errors++;
        document.getElementById('errors').textContent = errors;
      }
    }
    render();
    updateRemaining();
    checkWin();
  }

  function erase() {
    if (selected === null || given[selected] || won) return;
    if (grid[selected] && grid[selected] !== solution[selected]) errors--;
    grid[selected] = 0;
    notes[selected].clear();
    document.getElementById('errors').textContent = errors;
    render();
    updateRemaining();
  }

  function hint() {
    if (selected === null || given[selected] || won) return;
    const correct = solution[selected];
    if (grid[selected] !== correct) {
      if (grid[selected] && grid[selected] !== correct) errors--;
      grid[selected] = correct;
      notes[selected].clear();
      document.getElementById('errors').textContent = errors;
      render();
      updateRemaining();
      checkWin();
    }
  }

  function toggleNoteMode() {
    noteMode = !noteMode;
    document.getElementById('noteBtn').classList.toggle('active', noteMode);
  }

  function updateRemaining() {
    document.getElementById('remaining').textContent = grid.filter(v => v === 0).length;
  }

  function checkWin() {
    if (grid.every((v, i) => v === solution[i])) {
      won = true;
      clearInterval(timerInt);
      const m = Math.floor(timerSec / 60), s = timerSec % 60;
      document.getElementById('winDetail').textContent =
        `Solved in ${m}:${s.toString().padStart(2, '0')} with ${errors} error${errors !== 1 ? 's' : ''}.`;
      document.getElementById('winMsg').classList.add('show');
    }
  }

  document.addEventListener('keydown', e => {
    if (selected === null) return;
    if (e.key >= '1' && e.key <= '9') { inputNum(parseInt(e.key)); return; }
    if (e.key === 'Backspace' || e.key === 'Delete') { erase(); return; }
    const r = Math.floor(selected / 9), c = selected % 9;
    if      (e.key === 'ArrowUp'    && r > 0) { selected = (r - 1) * 9 + c; render(); }
    else if (e.key === 'ArrowDown'  && r < 8) { selected = (r + 1) * 9 + c; render(); }
    else if (e.key === 'ArrowLeft'  && c > 0) { selected = r * 9 + c - 1;   render(); }
    else if (e.key === 'ArrowRight' && c < 8) { selected = r * 9 + c + 1;   render(); }
  });

  newGame();
</script>
</body>
</html>
